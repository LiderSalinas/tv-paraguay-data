name: tv_paraguay
description: App de TV Paraguay para reproducir canales nacionales.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.2
  video_player: ^2.9.2
  webview_flutter: ^4.10.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - canales.json